<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Intelligenter RAG-Chatbot – kontextualisierbar, modernes Design, Rich-UI-Antworten." />
  <title>AI Chatbot</title>

  <!-- marked.js für Markdown-Rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Unicorn Studio SDK -->
  <script src="https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.1/dist/unicornStudio.umd.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Hintergrund-Animation -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">✦</div>
          <span>AIvenga</span>
        </div>
        <button id="new-chat-btn" title="Neuer Chat" aria-label="Neuen Chat starten">+</button>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-title">Chat-Verlauf</div>
        <div id="chat-history">
          <!-- Chat-History wird hier dynamisch eingefügt -->
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="status-dot"></div>
        <span>Verbunden</span>
      </div>
    </aside>

    <!-- Haupt-Chat-Bereich -->
    <main id="chat-main">

      <!-- Header -->
      <header id="chat-header">
        <div class="header-center">
          <span class="model-badge" role="status" aria-label="Aktueller Status">AIvenga Financial Expert</span>
        </div>
        <div class="header-actions">
          <button id="clear-btn" title="Chat leeren" aria-label="Chat leeren und neu starten" role="button">✕</button>
        </div>
      </header>

      <!-- Nachrichten -->
      <div id="chat-messages" role="log" aria-live="polite" aria-label="Chat-Verlauf">
        <!-- Willkommensnachricht -->
        <div class="welcome-screen">
          <!-- Unicorn Studio Background -->
          <div id="unicorn-container" class="unicorn-bg"></div>
          <div class="welcome-headline">
            <div class="welcome-icon" aria-hidden="true">✦</div>
            <h2>Guten Tag, Jon Doe</h2>
          </div>
          <div class="chat-input-container">
            <div class="chat-input-wrapper">
              <textarea placeholder="Wie kann ich dir heute helfen?" rows="1"></textarea>
              <div class="input-actions">
                <button class="attach-btn" aria-label="Anhang hinzufügen">
                  <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <rect x="6" y="0" width="1.3" height="13" rx="0.65" fill="#d9d9d9" />
                    <rect x="0" y="7" width="1.3" height="13" rx="0.65" transform="rotate(-90 0 7)" fill="#d9d9d9" />
                  </svg>
                </button>
                <button id="welcome-send-btn" aria-label="Nachricht senden">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                  </svg>
                </button>
              </div>
            </div>
            <div class="suggestion-chips" role="group" aria-label="Vorschläge">
              <button class="chip" onclick="sendSuggestion(this)" aria-label="Vorschlag: Ruf mein Depot auf">Ruf mein
                Depot auf</button>
              <button class="chip" onclick="sendSuggestion(this)" aria-label="Vorschlag: Was sind aktuelle News">Was
                sind aktuelle News</button>
              <button class="chip" onclick="sendSuggestion(this)" aria-label="Vorschlag: Zeig mir alle Optionen an">Zeig
                mir alle Optionen an</button>
              <button class="chip" onclick="sendSuggestion(this)" aria-label="Vorschlag: Password zurücksetzen">Password
                zurücksetzen</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Eingabebereich (versteckt initial, wird nach erster Nachricht angezeigt) -->
      <div id="input-area" class="hidden">
        <form id="chat-form" role="form" aria-label="Chatbot-Eingabe">
          <div class="input-wrapper">
            <label for="chat-input" class="sr-only">Nachricht eingeben</label>
            <textarea id="chat-input" placeholder="Antworten..." rows="1" autocomplete="off"
              aria-label="Nachricht eingeben" aria-describedby="input-hint"></textarea>
            <button class="attach-btn" aria-label="Anhang hinzufügen">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <rect x="6" y="0" width="1.3" height="13" rx="0.65" fill="#d9d9d9" />
                <rect x="0" y="7" width="1.3" height="13" rx="0.65" transform="rotate(-90 0 7)" fill="#d9d9d9" />
              </svg>
            </button>
            <button type="submit" id="send-btn" aria-label="Nachricht senden">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>
        </form>
      </div>

    </main>
  </div>

  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
